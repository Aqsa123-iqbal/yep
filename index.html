<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    transition:0.3s;
}
.dark{
    background:#121212;
    color:white;
}
.correct{
    background:#28a745 !important;
    color:white;
}
.wrong{
    background:#dc3545 !important;
    color:white;
}
.progress{
    height:12px;
}
</style>
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center">
        <h3>Quiz App</h3>
        <button class="btn btn-dark" onclick="toggleMode()">🌙</button>
    </div>

    <!-- Timer -->
    <h5 class="mt-3">⏳ Time: <span id="timer">30</span>s</h5>

    <!-- Progress -->
    <div class="progress mt-2">
        <div id="progressBar" class="progress-bar bg-success" style="width:0%"></div>
    </div>

    <!-- Question -->
    <h4 id="question" class="mt-4"></h4>

    <!-- Options -->
    <div id="options" class="mt-3"></div>

    <!-- Next -->
    <button class="btn btn-primary mt-3" onclick="nextQuestion()">Next</button>

    <!-- PDF -->
    <button class="btn btn-success mt-2" onclick="downloadPDF()">Download PDF</button>

</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
